    <style>
      :root {
        /* ── Base ── */
        --bg-color:            #FDF6EE;
        --card-color:          #FFFBF5;

        /* ── Brand Colors ── */
        --primary-color:       #8B4A1E;
        --accent-color:        #C8832A;

        /* ── Text ── */
        --text-heading:        #2A0F02;
        --text-card-heading:   #3D1A08;
        --text-main:           #3D1A08;
        --text-content:        #5C2D12;
        --text-muted:          #9B6640;

        /* ── Borders & Shadows ── */
        --glass-border:        rgba(200, 131, 42, 0.18);
        --premium-shadow:      0 4px 24px rgba(139, 74, 30, 0.08);

        /* ── Typography ── */
        --font-heading:        'Playfair Display', Georgia, 'Times New Roman', serif;
        --font-body:           'Plus Jakarta Sans', 'Segoe UI', system-ui, sans-serif;
        --font-price:          'Plus Jakarta Sans', 'Segoe UI', system-ui, sans-serif;
        --font-sans:           var(--font-body);
        --font-serif:          var(--font-heading);

        /* ── Layout ── */
        --container-public:    90rem;
        --page-pad-x:          1rem;
      }

      @media (min-width: 640px) {
        :root { --page-pad-x: 1.5rem; }
      }

      @media (min-width: 1024px) {
        :root { --page-pad-x: 3rem; }
      }

      .font-price,
      .price-hero,
      .price-tag-v2,
      .price-amount,
      .csc-price {
        font-family: var(--font-price);
        font-variant-numeric: tabular-nums lining-nums;
        font-feature-settings: 'tnum' 1, 'lnum' 1;
        letter-spacing: -0.02em;
      }

      body {
        overflow-x: hidden;
      }

      .text-gradient {
        background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
    </style>
